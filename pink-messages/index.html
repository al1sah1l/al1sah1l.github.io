<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pink Messages</title>
    <link rel="stylesheet" href="style.css" />
    <!--
      No-bundler browser fixes: `process` and Vue’s compile-time flags are normally
      set by a bundler. The router reads __VUE_PROD_DEVTOOLS__ as a global identifier.
    -->
    <script>
      globalThis.process = { env: { NODE_ENV: "production" } };
      globalThis.__VUE_PROD_DEVTOOLS__ = false;
    </script>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js",
          "vue-router": "https://unpkg.com/vue-router@4.4.5/dist/vue-router.mjs",
          "@vue/devtools-api": "https://unpkg.com/@vue/devtools-api@6.6.4/lib/esm/index.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app" aria-live="polite">Loading app…</div>
    <script type="module" src="index.js"></script>
  </body>
</html>
